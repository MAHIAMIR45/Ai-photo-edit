<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .error {
            color: red;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .results {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .image-box {
            text-align: center;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            max-width: 350px;
        }
        .image-box img {
            max-width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Editor</h1>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="image_url">Image URL (Imgur / ImgBB Direct Link):</label>
            <input type="text" id="image_url" name="image_url" value="{{ image_url or '' }}" placeholder="https://i.imgur.com/your_image.jpg" required>
        </div>
        <div class="form-group">
            <label for="prompt">Edit Instruction (Prompt):</label>
            <input type="text" id="prompt" name="prompt" value="{{ prompt or '' }}" placeholder="e.g. Make it look like a cartoon, turn day to night, add a hat" required>
        </div>
        <button type="submit">Edit Image</button>
    </form>

    {% if edited_img_b64 %}
    <div class="results">
        <div class="image-box">
            <h3>Original Image</h3>
            <img src="{{ original_img_url }}" alt="Original Image">
        </div>
        <div class="image-box">
            <h3>Edited Image (AI)</h3>
            <img src="data:image/jpeg;base64,{{ edited_img_b64 }}" alt="Edited Image">
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
