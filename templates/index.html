<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 850px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        .error {
            color: red;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        .results {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .image-box {
            text-align: center;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            flex: 1;
            min-width: 250px;
        }
        .image-box h3 { color: #555; margin-bottom: 10px; }
        .image-box img { max-width: 100%; border-radius: 5px; }
        .loader { display: none; text-align: center; margin-top: 20px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text { color: #007bff; font-size: 14px; margin-top: 8px; }
        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 7px 16px;
            background: #28a745;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
        }
        .download-btn:hover { background: #218838; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎨 AI Image Editor</h1>
    <p class="subtitle">Image URL aur editing instruction do — AI original image ko modify karega</p>

    <div class="error" id="errorBox"></div>

    <form id="mainForm">
        <div class="form-group">
            <label for="image_url">Image URL (Imgur / ImgBB Direct Link): *</label>
            <input type="text" id="image_url" name="image_url"
                   placeholder="https://i.ibb.co/your_image.jpg" required>
        </div>
        <div class="form-group">
            <label for="prompt">Edit Instruction (Prompt): *</label>
            <input type="text" id="prompt" name="prompt"
                   placeholder="e.g. change hair color to red, make it cartoon, add sunglasses" required>
        </div>
        <button type="submit" id="submitBtn">Edit Image ✏️</button>
    </form>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p class="status-text" id="statusText">AI image edit kar raha hai... 30-60 second lag sakte hain ⏳</p>
    </div>

    <div class="results" id="results" style="display:none;">
        <div class="image-box">
            <h3>📷 Original Image</h3>
            <img id="originalImg" src="" alt="Original Image">
        </div>
        <div class="image-box">
            <h3>✨ Edited Image (AI)</h3>
            <img id="editedImg" src="" alt="Edited Image">
            <br>
            <a id="downloadBtn" class="download-btn" download="edited-image.webp">⬇ Download</a>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('mainForm');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('statusText');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
        loader.style.display = 'none';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Edit Image ✏️';
    }

    async function pollStatus(jobId, imageUrl) {
        let attempts = 0;
        const poll = async () => {
            attempts++;
            if (attempts > 60) {
                showError('Timeout — dobara koshish karein.');
                return;
            }
            try {
                const resp = await fetch('/status/' + jobId);
                const data = await resp.json();
                if (data.error) { showError(data.error); return; }
                if (data.done && data.image) {
                    const src = 'data:image/webp;base64,' + data.image;
                    document.getElementById('originalImg').src = imageUrl;
                    document.getElementById('editedImg').src = src;
                    document.getElementById('downloadBtn').href = src;
                    loader.style.display = 'none';
                    results.style.display = 'flex';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Edit Image ✏️';
                    return;
                }
                statusText.textContent = 'AI edit kar raha hai... (' + attempts * 5 + 's) ⏳';
                setTimeout(poll, 5000);
            } catch(e) {
                showError('Network error: ' + e.message);
            }
        };
        poll();
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';
        results.style.display = 'none';
        loader.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';
        statusText.textContent = 'Job submit ho raha hai...';

        const imageUrl = document.getElementById('image_url').value.trim();
        const formData = new FormData(form);

        try {
            const resp = await fetch('/submit', { method: 'POST', body: formData });
            const data = await resp.json();
            if (data.error) { showError(data.error); return; }
            statusText.textContent = 'AI edit kar raha hai... ⏳';
            pollStatus(data.job_id, imageUrl);
        } catch(e) {
            showError('Submit fail: ' + e.message);
        }
    });
</script>
</body>
</html>
